name: Deploy semophone to Docker Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.NCP_HOST }}
          username: ${{ secrets.NCP_USER }}
          key: ${{ secrets.NCP_SSH_KEY }}
          timeout: 25m
          script: |
            set -e
            cd /root/projects/semophone/repo

            echo "=== git pull ==="
            git fetch --depth=1 origin master && git reset --hard FETCH_HEAD

            echo "=== docker build ==="
            docker build -t semophone:latest .

            echo "=== docker compose up ==="
            cd /root/projects/semophone
            docker compose up -d --wait

            echo "=== nginx reload ==="
            docker exec npm-app-1 nginx -s reload || true

            echo "=== health check ==="
            sleep 5
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4160/)
            echo "HTTP status: $STATUS"
            if [ "$STATUS" != "200" ]; then
              echo "Health check failed!"
              docker logs semophone --tail 50
              exit 1
            fi

            echo "=== Deploy complete ==="
